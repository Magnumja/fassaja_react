<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <rect x="40" y="50" width="120" height="140" rx="12" fill="white" stroke="#061B49" stroke-width="5"/>

  <!-- Presilha (handle) -->
  <rect x="75" y="35" width="50" height="20" rx="8" fill="#2477FF" stroke="#061B49" stroke-width="3"/>

  <!-- Checks on body -->
  <g stroke="#2477FF" stroke-width="4" fill="none" stroke-linecap="round">
    <!-- Check 1 -->
    <line x1="60" y1="100" x2="75" y2="115"/>
    <line x1="75" y1="115" x2="105" y2="85"/>

    <!-- Check 2 -->
    <line x1="60" y1="145" x2="75" y2="160"/>
    <line x1="75" y1="160" x2="105" y2="130"/>
  </g>

  <!-- Eyes -->
  <circle cx="70" cy="85" r="6" fill="#061B49"/>
  <circle cx="130" cy="85" r="6" fill="#061B49"/>

  <!-- Happy mouth -->
  <path d="M 80 110 Q 100 125 120 110" stroke="#FF6B7A" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Left leg -->
  <rect x="55" y="190" width="12" height="35" rx="6" fill="#061B49"/>

  <!-- Right leg -->
  <rect x="133" y="190" width="12" height="35" rx="6" fill="#061B49"/>

  <!-- Left arm (thumbs up) -->
  <g>
    <!-- Arm -->
    <line x1="40" y1="110" x2="15" y2="90" stroke="#061B49" stroke-width="8" stroke-linecap="round"/>
    <!-- Thumb -->
    <circle cx="12" cy="75" r="10" fill="#061B49"/>
    <rect x="8" y="60" width="8" height="20" rx="4" fill="#061B49"/>
  </g>

  <!-- Right arm -->
  <line x1="160" y1="110" x2="185" y2="90" stroke="#061B49" stroke-width="8" stroke-linecap="round"/>

  <!-- Sparkles around -->
  <g fill="#FBBF24">
    <circle cx="30" cy="40" r="4"/>
    <circle cx="170" cy="50" r="3"/>
    <circle cx="180" cy="120" r="3.5"/>
    <circle cx="20" cy="150" r="3"/>
  </g>
</svg>
