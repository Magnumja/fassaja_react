<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <rect x="40" y="50" width="120" height="140" rx="12" fill="white" stroke="#061B49" stroke-width="5"/>

  <!-- Presilha (handle) -->
  <rect x="75" y="35" width="50" height="20" rx="8" fill="#2477FF" stroke="#061B49" stroke-width="3"/>

  <!-- Checks on body -->
  <g stroke="#2477FF" stroke-width="4" fill="none" stroke-linecap="round">
    <!-- Check 1 -->
    <line x1="60" y1="100" x2="75" y2="115"/>
    <line x1="75" y1="115" x2="105" y2="85"/>
  </g>

  <!-- Empty checkbox -->
  <rect x="60" y="140" width="30" height="30" rx="4" fill="none" stroke="#2477FF" stroke-width="3"/>

  <!-- Eyes (confused/sad) -->
  <path d="M 65 80 Q 70 85 75 80" stroke="#061B49" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 125 80 Q 130 85 135 80" stroke="#061B49" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Worried mouth -->
  <line x1="80" y1="115" x2="120" y2="115" stroke="#061B49" stroke-width="3" stroke-linecap="round"/>

  <!-- Left leg -->
  <rect x="55" y="190" width="12" height="35" rx="6" fill="#061B49"/>

  <!-- Right leg -->
  <rect x="133" y="190" width="12" height="35" rx="6" fill="#061B49"/>

  <!-- Left arm -->
  <g>
    <line x1="40" y1="115" x2="10" y2="100" stroke="#061B49" stroke-width="8" stroke-linecap="round"/>
    <circle cx="8" cy="95" r="6" fill="#061B49"/>
  </g>

  <!-- Right arm -->
  <g>
    <line x1="160" y1="115" x2="190" y2="100" stroke="#061B49" stroke-width="8" stroke-linecap="round"/>
    <circle cx="192" cy="95" r="6" fill="#061B49"/>
  </g>

  <!-- 404 Sign in left hand -->
  <g transform="translate(0, 0)">
    <!-- Sign board -->
    <rect x="5" y="50" width="50" height="35" rx="4" fill="white" stroke="#061B49" stroke-width="3"/>
    <!-- Text -->
    <text x="30" y="75" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2477FF" text-anchor="middle">404</text>
  </g>

  <!-- Lost/confused clouds -->
  <g fill="none" stroke="#A8D5FF" stroke-width="2" opacity="0.6">
    <path d="M 155 35 Q 165 25 175 35"/>
    <path d="M 160 40 Q 170 30 180 40"/>
  </g>

  <!-- Question mark accent -->
  <g font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2477FF" opacity="0.5">
    <text x="155" y="65">?</text>
  </g>
</svg>
