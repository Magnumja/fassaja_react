<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <rect x="40" y="50" width="120" height="140" rx="12" fill="white" stroke="#061B49" stroke-width="5"/>

  <!-- Presilha (handle) -->
  <rect x="75" y="35" width="50" height="20" rx="8" fill="#2477FF" stroke="#061B49" stroke-width="3"/>

  <!-- Checks on body -->
  <g stroke="#2477FF" stroke-width="4" fill="none" stroke-linecap="round">
    <!-- Check 1 -->
    <line x1="60" y1="100" x2="75" y2="115"/>
    <line x1="75" y1="115" x2="105" y2="85"/>
  </g>

  <!-- Empty checkbox -->
  <rect x="60" y="140" width="30" height="30" rx="4" fill="none" stroke="#2477FF" stroke-width="3"/>

  <!-- Eyes (sad/tearful) -->
  <path d="M 65 80 Q 70 85 75 80" stroke="#061B49" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 125 80 Q 130 85 135 80" stroke="#061B49" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Tears -->
  <circle cx="70" cy="95" r="2" fill="#A8D5FF"/>
  <circle cx="130" cy="95" r="2" fill="#A8D5FF"/>

  <!-- Sad mouth -->
  <path d="M 80 120 Q 100 110 120 120" stroke="#061B49" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Left leg -->
  <rect x="55" y="190" width="12" height="35" rx="6" fill="#061B49"/>

  <!-- Right leg -->
  <rect x="133" y="190" width="12" height="35" rx="6" fill="#061B49"/>

  <!-- Left arm (sad pose) -->
  <g>
    <line x1="40" y1="120" x2="15" y2="140" stroke="#061B49" stroke-width="8" stroke-linecap="round"/>
    <circle cx="12" cy="152" r="6" fill="#061B49"/>
  </g>

  <!-- Right arm (sad pose) -->
  <g>
    <line x1="160" y1="120" x2="185" y2="140" stroke="#061B49" stroke-width="8" stroke-linecap="round"/>
    <circle cx="188" cy="152" r="6" fill="#061B49"/>
  </g>

  <!-- Rain/sad atmosphere -->
  <g stroke="#A8D5FF" stroke-width="2" stroke-linecap="round">
    <line x1="20" y1="30" x2="15" y2="45"/>
    <line x1="40" y1="25" x2="35" y2="40"/>
    <line x1="160" y1="35" x2="155" y2="50"/>
    <line x1="180" y1="40" x2="175" y2="55"/>
  </g>
</svg>
