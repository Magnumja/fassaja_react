<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <rect x="40" y="50" width="120" height="140" rx="12" fill="white" stroke="#061B49" stroke-width="5"/>

  <!-- Presilha (handle) -->
  <rect x="75" y="35" width="50" height="20" rx="8" fill="#2477FF" stroke="#061B49" stroke-width="3"/>

  <!-- Checks on body (3 checks = more completed) -->
  <g stroke="#2477FF" stroke-width="4" fill="none" stroke-linecap="round">
    <!-- Check 1 -->
    <line x1="60" y1="80" x2="75" y2="95"/>
    <line x1="75" y1="95" x2="105" y2="65"/>

    <!-- Check 2 -->
    <line x1="60" y1="125" x2="75" y2="140"/>
    <line x1="75" y1="140" x2="105" y2="110"/>

    <!-- Check 3 -->
    <line x1="60" y1="170" x2="75" y2="185"/>
    <line x1="75" y1="185" x2="105" y2="155"/>
  </g>

  <!-- Eyes (happy/strong) -->
  <path d="M 65 85 Q 70 90 75 85" stroke="#061B49" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 125 85 Q 130 90 135 85" stroke="#061B49" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Happy mouth -->
  <path d="M 80 105 Q 100 120 120 105" stroke="#FF6B7A" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Left leg -->
  <rect x="55" y="190" width="12" height="35" rx="6" fill="#061B49"/>

  <!-- Right leg -->
  <rect x="133" y="190" width="12" height="35" rx="6" fill="#061B49"/>

  <!-- Left arm (flexed muscle) -->
  <g>
    <!-- Upper arm -->
    <line x1="40" y1="100" x2="10" y2="75" stroke="#061B49" stroke-width="10" stroke-linecap="round"/>
    <!-- Bicep bulge -->
    <circle cx="20" cy="85" r="12" fill="#2477FF" stroke="#061B49" stroke-width="2"/>
    <!-- Fist -->
    <circle cx="8" cy="70" r="8" fill="#061B49"/>
  </g>

  <!-- Right arm (flexed muscle) -->
  <g>
    <!-- Upper arm -->
    <line x1="160" y1="100" x2="190" y2="75" stroke="#061B49" stroke-width="10" stroke-linecap="round"/>
    <!-- Bicep bulge -->
    <circle cx="180" cy="85" r="12" fill="#2477FF" stroke="#061B49" stroke-width="2"/>
    <!-- Fist -->
    <circle cx="192" cy="70" r="8" fill="#061B49"/>
  </g>

  <!-- Sparkles/energy -->
  <g fill="#FBBF24">
    <circle cx="25" cy="55" r="5"/>
    <circle cx="175" cy="60" r="4.5"/>
    <circle cx="15" cy="110" r="4"/>
    <circle cx="185" cy="115" r="4"/>
  </g>

  <!-- Stars for celebration -->
  <g fill="#FBBF24">
    <path d="M 30 30 L 33 37 L 41 37 L 35 42 L 37 50 L 30 45 L 23 50 L 25 42 L 19 37 L 27 37 Z"/>
    <path d="M 170 35 L 173 42 L 181 42 L 175 47 L 177 55 L 170 50 L 163 55 L 165 47 L 159 42 L 167 42 Z"/>
  </g>
</svg>
